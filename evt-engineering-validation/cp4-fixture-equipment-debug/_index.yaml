checkpoint_id: EVT-CP4
checkpoint_name: Fixture Prototype and Equipment Bring-Up
checkpoint_name_zh: 夹具打样与设备联调
phase: EVT
checkpoint_sequence: 4
description: 'Receive fixture prototype from vendor, debug hardware/contact issues,
  establish equipment setup, and track vendor action items to closure. Fixture qualification
  (GR&R) is planned but not yet executed at EVT.

  '
entry_criteria:
- Fixture prototype received from vendor
- Test station hardware available
- EVT-CP2 Test Plan approved
exit_criteria:
- Fixture Debug Report documents all issues and status
- All critical fixture defects resolved
- Equipment Setup Instruction available for station operators
- Vendor Action Tracker shows no open critical items
