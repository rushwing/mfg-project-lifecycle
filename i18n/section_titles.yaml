# i18n/section_titles.yaml
#
# Static translations for universal structural section headings — the small
# set of labels that appear verbatim in current required_sections values and
# where consistent terminology across documents is important.
#
# SCOPE: Only headings that (a) appear in actual required_sections values
# AND (b) are generic enough to warrant a locked translation belong here.
# All other section headings are translated dynamically by the RAG agent
# at generation time using GLOSSARY.md canonical forms. Do not add headings
# to this file just because a translation is convenient; prefer the dynamic
# path so this file stays authoritative and small.
#
# IMPORTANT: Keys are bare labels WITHOUT the leading number prefix.
#   required_sections values look like: "1. Purpose and Scope"
#   Keys in this file look like:        "Purpose and Scope"
#
# The lookup helper strips "N. " before matching and re-attaches it to the
# result. See i18n/README.md for the canonical get_section_title() implementation.
#
# Languages:
#   zh-CN — Simplified Chinese (深圳/大陆工厂)
#   zh-TW — Traditional Chinese (台湾工厂)
#   vi    — Vietnamese (待定 / pending)

"Purpose and Scope":
  zh-CN: "目的与范围"
  zh-TW: "目的與範圍"
  vi: "(pending)"

"Revision History":
