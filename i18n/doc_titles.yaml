# i18n/doc_titles.yaml
#
# Localized document titles keyed by doc_id.
# English title is the ground truth in each _index.yaml.
# This file provides translated titles for RAG agent document generation.
#
# Languages:
#   en    — English (ground truth, matches _index.yaml)
#   zh-CN — Simplified Chinese (深圳/大陆工厂)
#   zh-TW — Traditional Chinese (台湾工厂)
#   vi    — Vietnamese (待定 / pending)
#
# Usage:
#   agent = DocumentAgent(language="zh-CN")
#   title = doc_titles[doc_id].get("zh-CN", doc_titles[doc_id]["en"])

