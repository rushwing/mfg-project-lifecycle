  owner_role: Factory Ops
  priority: critical
  product_families:
  - GPU
  - DC-L6
  - Automotive
  - Embedded
  test_stations:
  - Universal
  rag_chunk_strategy: by-section
  embedding_priority: medium
  controlled_terms:
  - Yield
  - UPH
  - WIP
  - OEE
  - True Fail
  - False Fail
  required_sections:
  - 1. Date and Shift
  - 2. Production Summary (Input / Output / WIP)
  - 3. Yield by Station
  - 4. UPH by Station
  - 5. Top Issues
  - 6. Actions
