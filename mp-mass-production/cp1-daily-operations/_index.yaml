checkpoint_id: MP-CP1
checkpoint_name: Daily Production Operations
checkpoint_name_zh: 量产日常运营
phase: MP
checkpoint_sequence: 1
description: 'Day-to-day production monitoring and reporting. Track yield, UPH, WIP,
  downtime, and escalations on a shift/daily basis. These documents are the operational
  heartbeat of the production floor.

  '
entry_criteria:
- PVT-CP5 Handover Package received by Factory Ops
- First production lot started
exit_criteria:
- N/A — ongoing operational cadence
