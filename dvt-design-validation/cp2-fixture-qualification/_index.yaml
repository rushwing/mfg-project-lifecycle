checkpoint_id: DVT-CP2
checkpoint_name: Fixture Qualification and Repeatability Verification
checkpoint_name_zh: 治具/设备定版与重复性验证
phase: DVT
checkpoint_sequence: 2
description: 'Formally qualify test fixtures for production use. Execute GR&R studies
  to validate measurement repeatability and reproducibility. Issue Fixture Acceptance
  Report. Establish equipment calibration and preventive maintenance plans.

  '
entry_criteria:
- DVT fixture build complete (production-intent tooling)
- Test program stable enough for GR&R study execution
- Golden Sample units available and characterized
exit_criteria:
- Fixture Qualification Plan executed per plan
- 'GR&R Report: %GR&R < 10% for all critical parametric measurements'
- Fixture Acceptance Report signed by MTE Lead and Quality Engineer
- Equipment Calibration Plan in place
- PM Plan established and handed to factory ops
