checkpoint_id: P1-CP3
checkpoint_name: Fixture / Equipment / Vendor Pre-Evaluation
checkpoint_name_zh: 夹具/设备/供应商前期评估
phase: P1
checkpoint_sequence: 3
description: 'Evaluate fixture concepts, define equipment requirements, issue RFQs
  to vendors, conduct feasibility reviews, and establish CAPEX budget. Long fixture
  lead times make early vendor engagement critical for EVT schedule.

  '
entry_criteria:
- P1-CP2 MFG Test Architecture Spec approved
- Preliminary HW layout/package information available
exit_criteria:
- Fixture Concept Proposal reviewed by MTE Lead and HW Design
- Equipment Requirement Spec (ERS) issued to at least 2 vendors
- Vendor RFQ responses received and evaluated
- CAPEX Budget Draft approved by MTE Manager
- Fixture feasibility confirmed (no showstoppers)
