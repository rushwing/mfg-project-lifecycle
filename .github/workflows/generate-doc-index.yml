name: Generate DOC_INDEX

on:
  push:
    branches:
      - main
    paths:
      - "**/*-template.md"
      - "scripts/generate_doc_index.py"
      - "pyproject.toml"

jobs:
  generate-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Generate DOC_INDEX.md
        run: uv run python scripts/generate_doc_index.py

      - name: Commit DOC_INDEX.md if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DOC_INDEX.md
          git diff --staged --quiet || git commit -m "chore: regenerate DOC_INDEX.md [skip ci]"
          git push
