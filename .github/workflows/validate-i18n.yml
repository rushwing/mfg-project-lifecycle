name: Validate i18n

on:
  pull_request:
    paths:
      - "i18n/**"
      - "shared/_snippets/*.md"
      - "**/_index.yaml"
      - "scripts/validate_i18n.py"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  validate-i18n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Validate i18n YAML and doc_id coverage
        run: uv run python scripts/validate_i18n.py
