name: Validate KB Structure

on:
  pull_request:
    paths:
      - "**/_index.yaml"
      - "**/*-template.md"
      - "schemas/checkpoint_index.schema.json"
      - "scripts/validate_structure.py"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Validate KB structure and cross-references
        run: uv run python scripts/validate_structure.py
