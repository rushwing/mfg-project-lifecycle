checkpoint_id: PVT-CP4
checkpoint_name: SFC / Traceability / Data Closure
checkpoint_name_zh: SFC / Traceability / 数据闭环
phase: PVT
checkpoint_sequence: 4
description: 'Validate end-to-end SFC integration, traceability data completeness,
  data upload to factory systems, serial number control, and repair/rework flow. Ensures
  all unit manufacturing data is captured and queryable before MP handover.

  '
entry_criteria:
- SFC system live and accepting data from all test stations
- PVT build units with serial numbers flowing through all stations
exit_criteria:
- 'SFC Validation Report: 100% of test results uploaded for PVT sample units'
- Traceability Mapping Document reviewed and signed
- 'Data Upload Validation: zero data loss events'
- Serial Number Control Plan approved
- Repair/Rework Flow Spec validated with actual repair cases
