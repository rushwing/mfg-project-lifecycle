checkpoint_id: PVT-CP3
checkpoint_name: Yield / Efficiency / Stability Validation
checkpoint_name_zh: 良率/效率/稳定性验证
phase: PVT
checkpoint_sequence: 3
description: 'Validate that yield, UPH, and equipment stability meet MP targets under
  real production conditions over a sustained period. Identify and resolve any escapes,
  false fails, or downtime sources before MP handover.

  '
entry_criteria:
- PVT-CP2 station qualifications (IQ/OQ) complete
- PVT build running (min 3 consecutive production days)
- SFC data collection active
exit_criteria:
- First Pass Yield ≥ target sustained over 3 consecutive days
- UPH Validation Report confirms UPH meets MP requirement
- 'Downtime Report: OEE ≥ target for all critical stations'
- 'Escape/Leakage Analysis: no new coverage gaps identified'
- False Fail rate ≤ 2% for all test items
documents:
- doc_id: PVT-CP3-PYR-001
  title: PVT Yield Report
  slug: pvt-yield-report
  doc_type: report
  owner_role: MTE Staff
  priority: critical
  product_families:
  - GPU
  - DC-L6
  - Automotive
  - Embedded
  test_stations:
  - Universal
  rag_chunk_strategy: by-section
  embedding_priority: high
  controlled_terms:
  - Yield
  - True Fail
  - False Fail
  - DPM
  - Retest
  - CAPA
  required_sections:
  - 1. Purpose
  - 2. Build Period and Sample Size
  - 3. Yield by Station
  - 4. Yield Trend Chart
  - 5. Top Failure Modes
  - 6. Actions
  - 7. Revision History
