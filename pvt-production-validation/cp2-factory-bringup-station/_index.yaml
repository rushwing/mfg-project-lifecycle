checkpoint_id: PVT-CP2
checkpoint_name: Factory Line Bring-Up and Station Qualification
checkpoint_name_zh: 工厂导入与站位验证
phase: PVT
checkpoint_sequence: 2
description: 'Execute factory line bring-up at production site. Qualify each test
  station through IQ and OQ protocols. Verify site readiness (infrastructure, safety,
  SFC connectivity). Complete production sign-off checklist.

  '
entry_criteria:
- Factory site infrastructure ready (power, air, ESD, network)
- Test stations installed at factory
- IQ/OQ procedures approved (from Line Qualification Plan)
exit_criteria:
- 'Line Bring-Up Checklist complete: all stations operational'
- Site Readiness Checklist signed by Site Manager and MTE Lead
- IQ completed for all test stations
- OQ passed for all test stations
- Production Sign-Off Checklist approved by Factory Ops and MTE Manager
